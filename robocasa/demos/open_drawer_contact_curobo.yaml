robot: PandaOmron
seed: 0
layout: 1
style: 1
control_freq: 20
render: false

execution_viewer: true
execution_planner: mppi # 用纯mppi还是用curobo + mppi分阶段
execution_viewer_fps: 30.0
execution_viewer_loop: false
execution_viewer_pd_kp: 350.0
execution_viewer_pd_kd: 35.0
execution_viewer_ghost_alpha: 0.26
execution_viewer_ghost_r: 0.05
execution_viewer_ghost_g: 0.45
execution_viewer_ghost_b: 1.0
execution_viewer_pd_substeps: 0

cuda_memory_limit_gb: 20.0
pull_distance:
target_open_fraction: 0.95
precontact_distance: 0.08
contact_sample_count:
handle_contact_sample_count: 80
panel_contact_sample_count: 15
handle_mink_candidate_faces: inner,top,bottom,outer
contact_margin: 0.003
contact_surface_projection_max_distance: 0.02
contact_cost_threshold: 0.35
require_feasible_contact: false
require_friction_cone_pull: true
contact_solver: ipopt
contact_lam_upper_bound: 2.0
contact_obj_mass: 0.01
contact_friction: 0.9
contact_stiffness: 12.5
contact_dt: 0.01
contact_pos_coef: 1.0
contact_ori_coef: 0.0005
contact_stage1_scene_check: true
contact_stage1_scene_penetration_tolerance: 0.005
obstacle_cloud_points_per_geom: 200
object_representative_point_count: 2048
object_representative_min_per_geom: 16

use_q_config_mpc: true
q_config_mpc_device: cuda:0
q_config_mpc_hypothesis_count: 1
q_config_mpc_num_samples: 5
q_config_mpc_iterations: 16
q_config_mpc_arm_noise: 0.15
q_config_mpc_gripper_noise: 0.02
q_config_mpc_contact_weight: 200.0
q_config_mpc_penetration_weight: 400.0
q_config_mpc_penetration_margin: 0.002
q_config_mpc_reg_weight: 1.0
q_config_mpc_nconmax_per_env: 120
q_config_mpc_njmax_per_env: 500
q_config_mpc_success_contact_fraction: 0.5
q_config_mpc_memory_budget_fraction: 0.20

use_joint_interpolation: false
allow_joint_interpolation_fallback: false
joint_interpolation_steps_per_segment: 32
joint_validation_max_failures: 8

scene_process: true
scene_xml_root_attr: drawer
scene_cache_dir:
scene_points_per_link: 2048
scene_force_rebuild: false
scene_visibility_camera: robot0_agentview_left
scene_visibility_device: cuda:0
scene_visibility_width: 640
scene_visibility_height: 480
scene_visibility_hit_tolerance: 0.012
scene_disable_bvh: false
scene_require_mjwarp: false
require_visible_contact: false
scene_visible_point_max_distance: 0.03

dream_device: cuda:0
dream_action_distance:
dream_max_action_distance: 0.08
dream_initial_contact_feasible_distance: 0.025
dream_contact_target_tolerance: 0.025
dream_initial_pose_tolerance: 0.01
dream_open_success_fraction: 0.25
dream_mppi_num_samples: 128
dream_mppi_num_perturb_samples: 1
dream_mppi_iterations: 6
dream_mppi_horizon_steps: 25
dream_mppi_knot_steps: 5
dream_mppi_dt: 0.005
dream_mppi_position_noise: 0.01
dream_mppi_rotation_noise: 0.01
dream_contact_stiffness: 0.2
dream_contact_damping: 0.001
dream_mppi_nconmax_per_env: 120
dream_mppi_njmax_per_env: 500
dream_mppi_mink_q_weight: 5.0
dream_mppi_orientation_weight: 10.0
dream_mppi_contact_weight: 500.0
dream_mppi_object_pose_weight: 100.0
dream_mppi_lm_damping: 1.0e-2
dream_mppi_ik_weight: 1.0
dream_mppi_lm_step_weight: 1.0e-3
dream_mppi_joint_limit_weight: 10.0
disable_dream_cuda_graph: false

curobo_sphere_device: ""
curobo_ee_sphere_links: panda_link7,panda_hand,panda_leftfinger,panda_rightfinger
curobo_contact_sphere_links: panda_leftfinger,panda_rightfinger,panda_hand
curobo_sphere_min_radius: 0.005
sphere_contact_penetration_tolerance: 0.001
curobo_world_exclude_geoms: "left_eef_target_box,left_eef_target_sphere,right_eef_target_box,right_eef_target_sphere"
curobo_world_padding: 0.002
curobo_ik_seeds: 32
curobo_graph_seeds: 4
curobo_trajopt_seeds: 4
curobo_joint_enable_graph: true
curobo_joint_max_attempts: 12
curobo_joint_timeout: 10.0
curobo_joint_graph_max_attempts: 6
curobo_joint_graph_timeout: 20.0
curobo_joint_enable_finetune_trajopt: true

demonstration_dataset: ""
demonstration_task: OpenDrawer
demonstration_index: 0
demonstration_motion_lookahead: 10
demonstration_drawer_motion_threshold: 1.0e-4
demonstration_transform_tolerance: 1.0e-8
align_base_to_demonstration_ee: true
demonstration_base_align_iters: 2
demonstration_base_position_tolerance: 0.003
demonstration_base_max_translation_step: 0.5
demonstration_base_max_yaw_delta: 3.141592653589793

mink_contact_frame: gripper0_right_grip_site
require_mink_precontact: true
mink_max_iters: 120
mink_dt: 0.02
mink_solver: quadprog
mink_damping: 1.0e-5
mink_position_cost: 80.0
mink_orientation_cost: 0.8
mink_arm_posture_cost: 0.02
mink_locked_dof_cost: 200.0
mink_posture_lm_damping: 2.0
mink_frame_lm_damping: 1.0
mink_position_tolerance: 0.008
mink_collision_penetration_tolerance: 0.003
mink_collision_scope: arm
mink_actual_contact_max_distance: 0.001
mink_actual_contact_point_tolerance: 0.02

skip_curobo: false
curobo_robot_cfg: franka.yml
curobo_target_position_tolerance: 0.02
curobo_target_rotation_tolerance: 0.25

output: /tmp/robocasa_open_drawer_contact_curobo.npz
